    <!-- 引入 Tailwind CSS CDN -->

    <style>

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;

<body class="bg-slate-50 text-slate-900 selection:bg-red-800 selection:text-white">

    <!-- 挂载点 -->
    <div id="root"></div>

    <script>
        // ==========================================
        // 1. 模拟数据 (Mock Data)
        // ==========================================
        const MOCK_PRODUCTS = [
            { id: 1, name: "16英寸加长特厚电焊手套", category: "电焊防护", isHot: true, price: "B2B询价", desc: "1.3mm特级牛肩皮，全凯夫拉线，适合高强度防飞溅。", img: "6268.jpg" },
            { id: 2, name: "掌心加固双层耐磨手套", category: "重型搬运", isHot: true, price: "B2B询价", desc: "拇指及掌心双层牛皮加固，矿场/钢厂搬运首选。", img: "6264.jpg" },
            { id: 3, name: "美式全牛二层无缝短款", category: "通用劳保", isHot: true, price: "B2B询价", desc: "Wing Thumb 人体工学设计，抓握更灵活。", img: "6266.jpg" },
            { id: 4, name: "铝箔隔热抗辐射电焊手套", category: "极端高温", isHot: false, price: "定制产品", desc: "手背复合铝箔，掌心特级牛皮，针对炼钢炉前作业。", img: "6265.jpg" },
            { id: 5, name: "复合绒里极寒保暖皮手套", category: "极端环境", isHot: false, price: "B2B询价", desc: "加厚内胆，防风耐磨，适合俄罗斯/高纬度地区户外施工。", img: "6267.jpg" },
            { id: 6, name: "精细操作头层牛皮手套", category: "精密装配", isHot: false, price: "B2B询价", desc: "A级头层皮，触感真实，防油污，适合汽车零配件装配。", img: "6268.jpg" }
        ];

        const MOCK_CATEGORIES = [
            { name: "高强度电焊防护", icon: "flame", desc: "EN407 4级热防护，抗熔融飞溅" },
            { name: "重工业耐磨搬运", icon: "package", desc: "特级厚牛皮，掌心双层加固技术" },
            { name: "极端环境特种手套", icon: "shield-check", desc: "防化、超高温、极寒保暖等特种定制" },
            { name: "轻量级精密操作", icon: "list-ordered", desc: "头层皮/羊皮，高灵敏度防油作业" }
        ];

        const MOCK_ORDERS = [
            { id: "FLD-260417-001", product: "16英寸加长特厚电焊手套", quantity: "5,000 双", date: "2026-04-10", status: "生产中", statusColor: "text-blue-600", icon: "clock" },
            { id: "FLD-260322-089", product: "掌心加固双层耐磨手套", quantity: "12,000 双", date: "2026-03-22", status: "已发货 (海上)", statusColor: "text-orange-500", icon: "truck" },
            { id: "FLD-260115-024", product: "定制Logo款牛皮手套", quantity: "2,000 双", date: "2026-01-15", status: "已交付", statusColor: "text-green-600", icon: "check-circle" }
        ];

        // ==========================================
        // 2. 全局状态管理 (State)
        // ==========================================
        let state = {
            currentView: 'home',
            isMenuOpen: false,
            isLoggedIn: false,
            showLoginModal: false,
            loginMethod: 'wechat'
        };

        // ==========================================
        // 3. 业务逻辑函数 (Actions)
        // ==========================================
        function navigate(view) {
            if (view === 'orders' && !state.isLoggedIn) {
                state.showLoginModal = true;
                state.isMenuOpen = false;
                render();
                return;
            }
            state.currentView = view;
            state.isMenuOpen = false;
            window.scrollTo(0, 0);
            render();
        }

        function toggleMenu() {
            state.isMenuOpen = !state.isMenuOpen;
            render();
        }

        function toggleLoginModal(show) {
            state.showLoginModal = show;
            render();
        }

        function setLoginMethod(method) {
            state.loginMethod = method;
            render();
        }

        function handleLogin(e) {
            if (e) e.preventDefault();
            state.isLoggedIn = true;
            state.showLoginModal = false;
            navigate('orders'); // 登录成功直接跳到订单记录
        }

        // 处理图片加载失败
        function imgError(img) {
            img.onerror = null;
            img.src = 'https://via.placeholder.com/600x400?text=FLIDER+GLOVES';
        }

        // ==========================================
        // 4. 视图渲染函数 (Views)
        // ==========================================
        
        function renderNavbar() {
            return `
            <nav class="fixed w-full z-50 bg-white border-b-4 border-red-800 shadow-md">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between h-20 items-center">
                        <!-- Logo & Brand -->
                        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
                            <img src="6269.jpg" onerror="imgError(this)" alt="福立得Logo" class="h-12 w-12 object-cover rounded border border-red-800" />
                            <div class="flex flex-col">
                                <span class="text-2xl font-black tracking-tighter text-slate-900 leading-none">福立得</span>
                                <span class="text-[0.65rem] font-bold tracking-widest text-red-800 uppercase">FLIDER B2B</span>
                            </div>
                        </div>

                        <!-- Desktop Menu -->
                        <div class="hidden lg:flex items-center space-x-8 font-black text-sm tracking-widest text-slate-700">
                            <button onclick="navigate('home')" class="hover:text-red-800 ${state.currentView === 'home' ? 'text-red-800 border-b-2 border-red-800' : ''}">首页</button>
                            <button onclick="navigate('categories')" class="hover:text-red-800 ${state.currentView === 'categories' ? 'text-red-800 border-b-2 border-red-800' : ''}">产品分类</button>
                            <button onclick="navigate('hot')" class="hover:text-red-800 ${state.currentView === 'hot' ? 'text-red-800 border-b-2 border-red-800' : ''}">热销商品</button>
                            <button onclick="navigate('all')" class="hover:text-red-800 ${state.currentView === 'all' ? 'text-red-800 border-b-2 border-red-800' : ''}">全部商品</button>
                            <button onclick="navigate('orders')" class="hover:text-red-800 ${state.currentView === 'orders' ? 'text-red-800 border-b-2 border-red-800' : ''}">订单记录</button>
                        </div>

                        <!-- Desktop Auth -->
                        <div class="hidden lg:flex items-center">
                            ${state.isLoggedIn ? `
                                <div class="flex items-center gap-2 text-slate-800 font-bold bg-slate-100 px-4 py-2 rounded-full cursor-pointer hover:bg-slate-200 transition" onclick="navigate('orders')">
                                    <i data-lucide="user" class="w-5 h-5 text-red-800"></i>
                                    <span>采购商 8099</span>
                                </div>
                            ` : `
                                <button onclick="toggleLoginModal(true)" class="flex items-center gap-2 bg-red-800 text-white px-6 py-2 rounded font-bold hover:bg-red-900 transition">
                                    <i data-lucide="log-in" class="w-4 h-4"></i> B2B 登录
                                </button>
                            `}
                        </div>

                        <!-- Mobile Menu Button -->
                        <div class="lg:hidden flex items-center">
                            <button onclick="toggleMenu()" class="text-slate-800">
                                <i data-lucide="${state.isMenuOpen ? 'x' : 'menu'}" class="w-8 h-8"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Mobile Menu Dropdown -->
                ${state.isMenuOpen ? `
                    <div class="lg:hidden bg-white border-t border-slate-200 shadow-xl absolute w-full z-40">
                        <div class="flex flex-col p-4 space-y-4 font-bold text-slate-700">
                            <button onclick="navigate('home')" class="text-left py-2">首页</button>
                            <button onclick="navigate('categories')" class="text-left py-2">产品分类</button>
                            <button onclick="navigate('hot')" class="text-left py-2">热销商品</button>
                            <button onclick="navigate('all')" class="text-left py-2">全部商品</button>
                            <button onclick="navigate('orders')" class="text-left py-2 text-red-800">订单记录</button>

                            ${state.isLoggedIn ? `

                                    <i data-lucide="user" class="w-5 h-5"></i> 采购商 8099

                                <button onclick="toggleLoginModal(true)" class="flex items-center justify-center gap-2 bg-red-800 text-white w-full py-3 rounded">
                                    <i data-lucide="log-in" class="w-4 h-4"></i> 登录 / 注册
                                </button>
                            `}
                        </div>
                    </div>

            </nav>
            `;
        }

        function renderLoginModal() {
            if (!state.showLoginModal) return '';
            return `
            <div class="fixed inset-0 bg-slate-900/80 z-[100] flex items-center justify-center backdrop-blur-sm p-4">
                <div class="bg-white max-w-md w-full rounded-xl shadow-2xl overflow-hidden relative">
                    <button onclick="toggleLoginModal(false)" class="absolute right-4 top-4 text-slate-400 hover:text-slate-800">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                    
                    <div class="p-8">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-black text-slate-900">欢迎回来</h2>
                            <p class="text-slate-500 mt-2 font-bold">福立得 B2B 客户专属订货系统</p>
                        </div>

                        <!-- Login Method Tabs -->
                        <div class="flex mb-6 border-b-2 border-slate-100">
                            <button class="flex-1 py-3 font-bold text-sm flex items-center justify-center gap-2 ${state.loginMethod === 'wechat' ? 'text-green-600 border-b-2 border-green-600' : 'text-slate-400'}" onclick="setLoginMethod('wechat')">

                            <button class="flex-1 py-3 font-bold text-sm flex items-center justify-center gap-2 ${state.loginMethod === 'account' ? 'text-red-800 border-b-2 border-red-800' : 'text-slate-400'}" onclick="setLoginMethod('account')">

                            </button>
                        </div>

                        <!-- Login Forms -->
                        ${state.loginMethod === 'wechat' ? `
                            <div class="flex flex-col items-center py-6">
                                <div class="w-48 h-48 bg-slate-100 rounded-lg flex items-center justify-center mb-4 border border-slate-200">
                                    <i data-lucide="qr-code" class="w-32 h-32 text-slate-800"></i>
                                </div>
                                <p class="text-sm text-slate-500 mb-6 text-center">请使用微信扫一扫<br/>直接登录/注册福立得 B2B 系统</p>

                                </button>

                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-1">手机号/企业账号</label>

                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-1">密码</label>

                                </div>
                                <button type="submit" class="bg-red-800 text-white w-full py-3 mt-4 rounded font-bold hover:bg-red-900 transition">
                                    登 录
                                </button>
                            </form>
                        `}
                    </div>
                    <div class="bg-slate-50 p-4 text-center text-xs text-slate-500 border-t border-slate-100">
                        仅限福立得认证企业客户及代理商登录
                    </div>
                </div>
            </div>
            `;
        }

        function renderHome() {
            return `

                <section class="bg-slate-900 text-white py-24 lg:py-32 relative overflow-hidden">
                    <div class="absolute inset-0 opacity-20">

                            </div>
                            <div class="md:w-3/4 mt-6 md:mt-0">

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">

                                        <div class="text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">反辐射热复合定制</div>
                                        <div class="text-sm font-bold text-slate-800">手背复合耐 1000℃ 铝箔防火隔热层，掌心配高密度耐高温皮</div>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-lg">
                                        <div class="text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">极寒保暖系统定制</div>
                                        <div class="text-sm font-bold text-slate-800">零下30度环境：内部填充 3M Thinsulate™ 保暖棉或高克重仿兔毛</div>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-lg">
                                        <div class="text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">防油浸渍处理</div>
                                        <div class="text-sm font-bold text-slate-800">皮料深度防水、防油污化学涂层浸渍工艺处理</div>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-lg">
                                        <div class="text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">多重防护技术叠加</div>
                                        <div class="text-sm font-bold text-slate-800">可将防割、防砸、防寒、耐油四种性能集中开发于一双皮手套</div>
                                    </div>
                                </div>
                                <button onclick="navigate('all')" class="bg-red-800 text-white px-6 py-3 rounded font-black hover:bg-red-900 transition flex items-center gap-2 w-fit">
                                    查看该系列 <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 4. 轻量级精密操作 -->
                    <div class="bg-white border-2 border-slate-100 hover:border-red-800 rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition duration-300">
                        <div class="p-8 md:flex gap-8 items-start">
                            <div class="bg-slate-100 p-6 rounded-xl md:w-1/4 flex flex-col items-center justify-center text-center shrink-0">
                                <i data-lucide="list-ordered" class="w-16 h-16 text-slate-700 mb-4"></i>
                                <h3 class="text-2xl font-black text-slate-800">轻量级精密操作</h3>
                                <span class="mt-2 bg-slate-800 text-white text-xs font-bold px-3 py-1 rounded-full tracking-widest uppercase">高灵敏度防油作业</span>
                            </div>
                            <div class="md:w-3/4 mt-6 md:mt-0">
                                <p class="text-slate-600 font-bold mb-6 text-lg">被称为“第二层皮肤”。专为 TIG 氩弧焊精密填丝、汽车零配件精细装配、仪器调校而生。</p>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                                    <div class="bg-slate-50 p-4 rounded-lg">
                                        <div class="text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">顶级薄皮选材定制</div>
                                        <div class="text-sm font-bold text-slate-800">0.6mm - 0.8mm A级纯头层山羊皮 / 鹿皮 / 柔软猪头层</div>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-lg">
                                        <div class="text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">无缝人体工学定制</div>
                                        <div class="text-sm font-bold text-slate-800">食指无接缝设计 (Seamless Index Finger)，大幅提升握持精准度</div>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-lg">
                                        <div class="text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">无内里 / 半隔热定制</div>
                                        <div class="text-sm font-bold text-slate-800">掌心无内里保留极致触感，手背增加薄层羊毛隔绝轻微热辐射</div>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-lg">
                                        <div class="text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">腕部锁定系统定制</div>
                                        <div class="text-sm font-bold text-slate-800">魔术贴粘扣 (Velcro) / 弹力橡筋收口系统，防止细杂物落入</div>
                                    </div>
                                </div>
                                <button onclick="navigate('all')" class="bg-red-800 text-white px-6 py-3 rounded font-black hover:bg-red-900 transition flex items-center gap-2 w-fit">
                                    查看该系列 <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            `;
        }

        function renderProductGrid(title, subtitle, filterHot) {
            let products = filterHot ? MOCK_PRODUCTS.filter(p => p.isHot) : MOCK_PRODUCTS;
            return `
            <div class="pt-28 pb-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 mb-2">${title}</h1>
                        <p class="text-slate-500 font-bold">${subtitle}</p>
                    </div>
                    ${title !== '全部商品' ? `<button onclick="navigate('all')" class="hidden sm:block text-red-800 font-bold hover:underline">查看全部</button>` : ''}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    ${products.map(p => `
                        <div class="bg-white border border-slate-200 overflow-hidden group hover:shadow-2xl transition duration-300 flex flex-col">
                            <div class="relative h-64 overflow-hidden bg-slate-100">
                                ${p.isHot ? `<div class="absolute top-4 right-4 bg-red-600 text-white text-xs font-black px-3 py-1 z-10 shadow-md">HOT 热销</div>` : ''}
                                <img src="${p.img}" onerror="imgError(this)" alt="${p.name}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-500" />
                            </div>
                            <div class="p-6 flex-1 flex flex-col">
                                <span class="text-xs font-bold text-red-800 tracking-widest">${p.category}</span>
                                <h3 class="text-xl font-black text-slate-900 mt-1 mb-3 leading-tight">${p.name}</h3>
                                <p class="text-slate-500 text-sm mb-6 line-clamp-2">${p.desc}</p>
                                <div class="mt-auto pt-4 border-t border-slate-100 flex justify-between items-center">
                                    <span class="font-black text-lg text-slate-800">${p.price}</span>
                                    <button onclick="toggleLoginModal(true)" class="bg-slate-900 text-white px-4 py-2 text-sm font-bold hover:bg-red-800 transition">获取大货价</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
            `;
        }

        function renderOrders() {
            return `
            <div class="pt-28 pb-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen">
                <div class="flex justify-between items-end mb-10 border-b-2 border-slate-200 pb-6">
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 mb-2">订单记录与追溯</h1>
                        <p class="text-slate-500 font-bold">透明化管理，随时掌握大货生产及物流进度。</p>
                    </div>
                    <button class="bg-red-800 text-white px-6 py-2 rounded font-bold hover:bg-red-900 transition flex items-center gap-2">
                        <i data-lucide="list-ordered" class="w-5 h-5"></i> 快速返单
                    </button>
                </div>

                <div class="bg-white shadow rounded-lg overflow-hidden border border-slate-200">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse whitespace-nowrap">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm font-bold uppercase tracking-wider">
                                    <th class="p-4">订单编号 / 日期</th>
                                    <th class="p-4">定制商品</th>
                                    <th class="p-4">数量</th>
                                    <th class="p-4">当前状态</th>
                                    <th class="p-4 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${MOCK_ORDERS.map(order => `
                                    <tr class="hover:bg-slate-50 transition">
                                        <td class="p-4">
                                            <div class="font-black text-slate-800">${order.id}</div>
                                            <div class="text-xs text-slate-400 mt-1">${order.date}</div>
                                        </td>
                                        <td class="p-4 font-bold text-slate-700">${order.product}</td>
                                        <td class="p-4 font-black text-slate-800">${order.quantity}</td>
                                        <td class="p-4">
                                            <span class="flex items-center gap-2 text-sm font-bold ${order.statusColor}">
                                                <i data-lucide="${order.icon}" class="w-5 h-5"></i> ${order.status}
                                            </span>
                                        </td>
                                        <td class="p-4 text-center">
                                            <button class="text-slate-500 hover:text-red-800 font-bold text-sm border border-slate-300 px-3 py-1 rounded hover:border-red-800 transition">
                                                查看明细
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <!-- Dashboard Stats -->
                    <div class="bg-slate-50 p-6 border-t border-slate-200 grid grid-cols-3 gap-4 text-center">
                        <div>
                            <div class="text-3xl font-black text-slate-800">3</div>
                            <div class="text-xs font-bold text-slate-500 mt-1">历史总订单数</div>
                        </div>
                        <div class="border-l border-r border-slate-200">
                            <div class="text-3xl font-black text-red-700">19,000</div>
                            <div class="text-xs font-bold text-slate-500 mt-1">累计提货双数</div>
                        </div>
                        <div>
                            <div class="text-3xl font-black text-slate-800">1</div>
                            <div class="text-xs font-bold text-slate-500 mt-1">生产中订单</div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderFooter() {
            return `
            <footer class="bg-black py-10 border-t border-red-900 text-center">
                <div class="max-w-7xl mx-auto px-6">
                    <div class="text-slate-500 text-xs tracking-widest font-bold uppercase mb-2">
                        © 2026 福立得 FLIDER SAFETY. B2B 专属定制平台.
                    </div>
                    <div class="text-slate-700 text-xs">
                        专注于高性能牛二层皮电焊手套，全品类支持 OEM/ODM
                    </div>
                </div>
            </footer>
            `;
        }

        // ==========================================
        // 5. 主渲染引擎 (App Runner)
        // ==========================================
        function render() {
            const root = document.getElementById('root');
            let content = '';

            // Routing
            if (state.currentView === 'home') {
                content = renderHome();
            } else if (state.currentView === 'categories') {
                content = renderCategories();
            } else if (state.currentView === 'hot') {
                content = renderProductGrid("热销商品", "经市场验证的爆款，出海拿单利器。", true);
            } else if (state.currentView === 'all') {
                content = renderProductGrid("全部商品", "支持参数修改与深度定制贴牌。", false);
            } else if (state.currentView === 'orders') {
                content = renderOrders();
            }

            // Build DOM
            root.innerHTML = `
                ${renderNavbar()}
                ${content}
                ${renderLoginModal()}
                ${renderFooter()}
            `;

            // Initialize Lucide Icons after DOM update
            lucide.createIcons();
        }

        // 初始化启动应用
        render();

    </script>
</body>
</html>
